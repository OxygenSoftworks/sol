<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diamond Proxy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Diamond</div>
        <ul class="nav-links">
            <li><a href="#browser" data-section="browser">Browser</a></li>
            <li><a href="#apps" data-section="apps">Apps</a></li>
            <li><a href="#games" data-section="games">Games</a></li>
        </ul>
    </nav>

    <main class="content">
        <section id="browser" class="section active">
            <div class="omnibox-container">
                <form id="url-form" class="url-form">
                    <input type="text" id="url-input" class="url-input" placeholder="Enter URL to browse..." autocomplete="off">
                    <button type="submit" class="go-btn">Go</button>
                </form>
            </div>
            <div class="browser-info">
                <p>Traffic is proxied through Wisp protocol with client-side TLS encryption</p>
            </div>
        </section>

        <section id="apps" class="section">
            <h2>Applications</h2>
            <div id="apps-grid" class="grid-container"></div>
        </section>

        <section id="games" class="section">
            <h2>Games</h2>
            <div id="games-grid" class="grid-container"></div>
        </section>
    </main>

    <template id="card-template">
        <div class="card">
            <div class="card-image"></div>
            <div class="card-title"></div>
            <div class="card-description"></div>
        </div>
    </template>

    <script src="app.js"></script>
</body>
</html>
